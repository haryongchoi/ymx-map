<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>YMX 성수동 런게임</title>
<style>
  :root{--navy:#1d3e79;--gold:#fdcf18;--on-gold:#1d3e79;--ink:#eaf1fb;--ink-soft:#9fb2d4;--hairline:rgba(159,178,212,.18);--panel:rgba(12,26,54,.92);
    --sans:-apple-system,BlinkMacSystemFont,Pretendard,"Apple SD Gothic Neo","Segoe UI",Roboto,sans-serif;--mono:ui-monospace,Menlo,monospace;}
  *{box-sizing:border-box}html,body{height:100%;margin:0}
  body{font-family:var(--sans);color:var(--ink);background:#0a152b;overflow:hidden;-webkit-font-smoothing:antialiased;touch-action:none}
  #app{position:fixed;inset:0;display:flex;flex-direction:column;max-width:1100px;margin:0 auto;padding:12px 14px 14px;gap:10px}
  .top{display:flex;align-items:center;justify-content:space-between;gap:12px}
  .brand{display:flex;align-items:center;gap:10px}.brand img{height:26px}.brand b{font-size:14px;font-weight:800}
  .back{font-size:12px;color:var(--ink-soft);text-decoration:none;border:1px solid var(--hairline);border-radius:8px;padding:6px 11px}
  .hud{display:flex;gap:16px;align-items:center}
  .hud .s{display:flex;flex-direction:column;align-items:flex-end;line-height:1.1}
  .hud .k{font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft)}
  .hud .v{font-family:var(--mono);font-size:17px;font-weight:700}.hud .v.gold{color:var(--gold)}
  .stage{position:relative;flex:1 1 auto;min-height:0;border-radius:14px;overflow:hidden;box-shadow:0 20px 50px -22px rgba(0,0,0,.6),0 0 0 1px var(--hairline);background:#bfe0f2}
  canvas{display:block;width:100%;height:100%}
  .hint{position:absolute;left:50%;bottom:14px;transform:translateX(-50%);font-size:12px;color:#17325f;background:rgba(255,255,255,.82);padding:6px 12px;border-radius:99px;transition:.4s}
  .ov{position:absolute;inset:0;display:grid;place-items:center;padding:22px;background:radial-gradient(120% 120% at 50% 0%,rgba(18,48,97,.5),rgba(4,10,20,.86));z-index:5}
  .ov.hide{display:none}
  .card{width:min(440px,100%);background:var(--panel);border:1px solid var(--hairline);border-radius:20px;padding:26px 26px 22px;text-align:center;box-shadow:0 26px 70px -30px rgba(0,0,0,.8)}
  .eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft);font-weight:700}
  .card h1{margin:.4rem 0 .2rem;font-size:clamp(24px,6vw,32px);font-weight:800}.card h1 .go{color:var(--gold)}
  .card p{margin:.3rem auto 0;max-width:34ch;font-size:13.5px;line-height:1.6;color:var(--ink-soft)}
  .stats{display:flex;gap:12px;justify-content:center;margin:18px 0 6px}
  .box{min-width:96px;background:rgba(255,255,255,.04);border:1px solid var(--hairline);border-radius:12px;padding:12px}
  .box .k{font-size:10px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.06em}.box .v{font-family:var(--mono);font-size:22px;font-weight:700;margin-top:3px}.box .v.gold{color:var(--gold)}
  .btn{cursor:pointer;height:46px;padding:0 26px;border-radius:9px;border:none;background:var(--gold);color:var(--on-gold);font-family:var(--sans);font-size:15px;font-weight:800;margin-top:16px}
  @media(max-width:520px){
    #app{padding:8px 8px 10px;gap:8px}
    .brand b{font-size:13px}.hud{gap:12px}.hud .v{font-size:15px}
    .back{padding:6px 9px;font-size:11px}
    .card{padding:22px 16px 18px}
    .card h1{font-size:26px}
    .card p{font-size:12.5px}
    .stats{gap:7px;width:100%}
    .box{min-width:0;flex:1;padding:11px 6px}
    .box .k{font-size:9px}.box .v{font-size:19px}
    .btn{width:100%;padding:0}
  }
</style>
<div id="app">
  <div class="top">
    <div class="brand"><img id="logo" alt="YMX"><b>성수동 런게임</b></div>
    <div class="hud">
      <div class="s"><div class="k">점수</div><div class="v" id="score">0</div></div>
      <div class="s"><div class="k">커피</div><div class="v gold" id="coin">0</div></div>
      <a class="back" href="index.html">🗺️ 지도로</a>
    </div>
  </div>
  <div class="stage" id="stage">
    <canvas id="c"></canvas>
    <div class="hint" id="hint" style="display:none"><b>스페이스 / 탭</b>으로 점프 · 2단 점프</div>
    <div class="ov" id="start">
      <div class="card">
        <div class="eyebrow">YMX · 심심풀이</div>
        <h1>성수동 <span class="go">런</span> 🏃</h1>
        <p>다리 달린 YMX가 성수동을 달립니다. 장애물을 뛰어넘고 커피를 모아 최고 점수에 도전하세요!</p>
        <button class="btn" id="startBtn">시작하기</button>
      </div>
    </div>
    <div class="ov hide" id="over">
      <div class="card">
        <div class="eyebrow">게임 오버</div>
        <h1>앗, <span class="go">부딪혔</span>다!</h1>
        <div class="stats">
          <div class="box"><div class="k">점수</div><div class="v" id="fScore">0</div></div>
          <div class="box"><div class="k">커피</div><div class="v gold" id="fCoin">0</div></div>
          <div class="box"><div class="k">최고</div><div class="v" id="fBest">0</div></div>
        </div>
        <button class="btn" id="retryBtn">다시 달리기</button>
      </div>
    </div>
  </div>
</div>

document.getElementById('logo').src=SYMBOL;
const img=new Image();let ready=false;img.onload=()=>ready=true;img.src=SYMBOL;
const cv=document.getElementById('c'),x=cv.getContext('2d');
let W=0,H=0,DPR=1,gy=0;
function rs(){const r=cv.getBoundingClientRect();DPR=Math.min(2,devicePixelRatio||1);W=r.width;H=r.height;cv.width=W*DPR|0;cv.height=H*DPR|0;x.setTransform(DPR,0,0,DPR,0,0);gy=H-Math.max(56,H*0.16);}
addEventListener('resize',rs);
const G={play:false,dist:0,coin:0,speed:0,shake:0,p:null,obs:[],cof:[],parts:[],builds:[],clouds:[],spawnT:0,coinT:0};
const S0=330,ACC=13,SMAX=760,GRAV=2600,JMP=-960,DBL=-860;
function P(){return{y:gy,vy:0,r:22,on:true,jn:0,run:0,rot:0,sq:1};}
function seed(){G.builds=[];G.clouds=[];let px=-20;while(px<W+200){const w=48+Math.random()*70,h=60+Math.random()*150,t=Math.random();G.builds.push({x:px,w,h,brick:t<0.6,seed:Math.random()});px+=w+8+Math.random()*22;}for(let i=0;i<5;i++)G.clouds.push({x:Math.random()*(W+200),y:20+Math.random()*80,s:.6+Math.random()*.8});}
function start(){rs();seed();G.play=true;G.dist=0;G.coin=0;G.speed=S0;G.shake=0;G.spawnT=1.1;G.coinT=.8;G.obs=[];G.cof=[];G.parts=[];G.p=P();
  document.getElementById('start').classList.add('hide');document.getElementById('over').classList.add('hide');
  const h=document.getElementById('hint');h.style.display='block';h.style.opacity=1;setTimeout(()=>h.style.opacity=0,3000);}
function jump(){if(!G.play)return;const p=G.p;if(p.on){p.vy=JMP;p.on=false;p.jn=1;dust(p.x0||W*0.2,gy,7);}else if(p.jn<2){p.vy=DBL;p.jn=2;}}
addEventListener('keydown',e=>{if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();if(G.play)jump();}});
cv.addEventListener('pointerdown',e=>{e.preventDefault();if(G.play)jump();});
function dust(px,py,n){for(let i=0;i<n;i++)G.parts.push({x:px,y:py,vx:-40-Math.random()*120,vy:-Math.random()*120,life:.4,max:.7,c:'#c9b48a',r:2});}
function spark(px,py){for(let i=0;i<10;i++){const a=Math.random()*6.28,s=60+Math.random()*150;G.parts.push({x:px,y:py,vx:Math.cos(a)*s,vy:Math.sin(a)*s-40,life:.5,max:.5,c:'#fdcf18',r:2});}}
const OB=[{w:24,h:30,t:'cone'},{w:34,h:36,t:'box'},{w:46,h:26,t:'kick'},{w:30,h:42,t:'plant'}];
function updateHud(){document.getElementById('score').textContent=Math.floor(G.dist/10);document.getElementById('coin').textContent=G.coin;}
let last=0;
function loop(ts){const dt=last?Math.min(.033,(ts-last)/1000):0;last=ts;if(G.play)up(dt);draw();requestAnimationFrame(loop);}
function up(dt){
  G.speed=Math.min(SMAX,G.speed+ACC*dt);const sp=G.speed;G.dist+=sp*dt;
  const p=G.p;p.x0=Math.max(70,W*0.2);
  p.vy+=GRAV*dt;p.y+=p.vy*dt;if(p.y>=gy){if(!p.on){p.sq=.7;dust(p.x0,gy,5);}p.y=gy;p.vy=0;p.on=true;p.jn=0;}
  p.sq+=(1-p.sq)*Math.min(1,dt*12);p.run+=dt*(p.on?sp*0.02:4);p.rot=p.on?Math.sin(p.run)*.06:Math.max(-.3,Math.min(.5,p.vy*.0004));
  if(G.shake>0)G.shake=Math.max(0,G.shake-dt*3);
  G.clouds.forEach(c=>{c.x-=sp*.05*dt;if(c.x<-140)c.x=W+140;});
  G.builds.forEach(b=>b.x-=sp*.4*dt);if(G.builds.length&&G.builds[0].x+G.builds[0].w<-20){const b=G.builds.shift();const lb=G.builds[G.builds.length-1];b.x=lb.x+lb.w+8+Math.random()*22;b.w=48+Math.random()*70;b.h=60+Math.random()*150;b.brick=Math.random()<.6;b.seed=Math.random();G.builds.push(b);}
  G.spawnT-=dt;G.coinT-=dt;const gap=Math.max(.72,1.5-(sp-S0)/900);
  if(G.spawnT<=0){const o=OB[Math.random()*OB.length|0];G.obs.push({...o,x:W+40});G.spawnT=gap*(.85+Math.random()*.5);}
  if(G.coinT<=0){const n=3+(Math.random()*3|0),arc=Math.random()>.5,by=arc?gy-110-Math.random()*40:gy-40-Math.random()*24;for(let i=0;i<n;i++)G.cof.push({x:W+40+i*32,y:arc?by+Math.sin(i/Math.max(1,n-1)*Math.PI)*-44:by,r:10,sp:Math.random()*6});G.coinT=1.5+Math.random()*1.4;}
  for(let i=G.obs.length-1;i>=0;i--){const o=G.obs[i];o.x-=sp*dt;if(o.x+o.w<-20){G.obs.splice(i,1);continue;}
    const px=p.x0-p.r*.55,pw=p.r*1.1,py=p.y-p.r*1.1,ph=p.r*1.5;if(px<o.x+o.w-4&&px+pw>o.x+4&&py<gy-0+0&&py+ph>gy-o.h){G.shake=1;over();return;}}
  for(let i=G.cof.length-1;i>=0;i--){const c=G.cof[i];c.x-=sp*dt;c.sp+=dt*6;if(c.x<-20){G.cof.splice(i,1);continue;}const dx=c.x-p.x0,dy=c.y-(p.y-p.r);if(dx*dx+dy*dy<(c.r+p.r)*(c.r+p.r)){G.coin++;spark(c.x,c.y);G.cof.splice(i,1);}}
  for(let i=G.parts.length-1;i>=0;i--){const q=G.parts[i];q.life-=dt;if(q.life<=0){G.parts.splice(i,1);continue;}q.x+=q.vx*dt;q.y+=q.vy*dt;q.vy+=600*dt;}
  updateHud();
}
function over(){G.play=false;const sc=Math.floor(G.dist/10);const best=Math.max(sc,+(localStorage.getItem('ymxrun')||0));localStorage.setItem('ymxrun',best);
  document.getElementById('fScore').textContent=sc;document.getElementById('fCoin').textContent=G.coin;document.getElementById('fBest').textContent=best;
  document.getElementById('hint').style.display='none';document.getElementById('over').classList.remove('hide');}
function draw(){
  x.save();if(G.shake>0){const s=G.shake*5;x.translate((Math.random()-.5)*s,(Math.random()-.5)*s);}
  const sky=x.createLinearGradient(0,0,0,H);sky.addColorStop(0,'#6fb2e4');sky.addColorStop(.45,'#a9d6ef');sky.addColorStop(.75,'#ffe6bd');sky.addColorStop(1,'#ffeecb');x.fillStyle=sky;x.fillRect(-20,-20,W+40,H+40);
  const sx=W*.8,sy=H*.28,g=x.createRadialGradient(sx,sy,0,sx,sy,140);g.addColorStop(0,'rgba(255,247,214,.9)');g.addColorStop(1,'rgba(255,238,190,0)');x.fillStyle=g;x.beginPath();x.arc(sx,sy,140,0,6.28);x.fill();
  if(!G.play&&!G.dist){x.restore();drawIdle();return;}
  G.clouds.forEach(c=>{x.fillStyle='rgba(255,255,255,.75)';cloud(c.x,c.y,22*c.s);});
  G.builds.forEach(b=>{const top=gy-b.h;if(b.brick){x.fillStyle=['#b25a42','#a94f38','#bb6146'][b.seed*3|0];x.fillRect(b.x,top,b.w,b.h);x.fillStyle='rgba(60,80,110,.5)';for(let wy=top+8;wy<gy-6;wy+=12)for(let wx=b.x+5;wx<b.x+b.w-5;wx+=12)x.fillRect(wx,wy,6,7);}else{const gg=x.createLinearGradient(b.x,0,b.x+b.w,0);gg.addColorStop(0,'#5f86bd');gg.addColorStop(1,'#8fb4dd');x.fillStyle=gg;x.fillRect(b.x,top,b.w,b.h);x.fillStyle='rgba(255,255,255,.28)';for(let wy=top+8;wy<gy-6;wy+=14)for(let wx=b.x+5;wx<b.x+b.w-5;wx+=13)x.fillRect(wx,wy,7,8);}});
  x.fillStyle='#5f6470';x.fillRect(-20,gy,W+40,H-gy+40);x.fillStyle='#7a8090';x.fillRect(-20,gy,W+40,3);
  x.fillStyle='rgba(255,255,255,.5)';const off=(G.dist)%48,dyl=gy+(H-gy)*.55;for(let px=-off;px<W;px+=48)x.fillRect(px,dyl,24,3);
  G.cof.forEach(c=>coffee(c));
  G.obs.forEach(o=>obst(o));
  G.parts.forEach(q=>{x.globalAlpha=Math.max(0,q.life/q.max);x.fillStyle=q.c;x.beginPath();x.arc(q.x,q.y,q.r,0,6.28);x.fill();});x.globalAlpha=1;
  if(G.play||G.dist)player();
  x.restore();
}
function drawIdle(){/* start screen shows overlay */}
function cloud(cx,cy,r){x.beginPath();x.arc(cx,cy,r,0,6.28);x.arc(cx+r,cy+3,r*.8,0,6.28);x.arc(cx-r,cy+4,r*.7,0,6.28);x.arc(cx+r*.4,cy-r*.5,r*.7,0,6.28);x.fill();}
function coffee(c){x.save();x.translate(c.x,c.y);x.globalAlpha=.3;x.fillStyle='#fdcf18';x.beginPath();x.arc(0,0,c.r*1.6,0,6.28);x.fill();x.globalAlpha=1;const b=Math.sin(c.sp)*2;x.translate(0,b);
  x.fillStyle='#fff';x.beginPath();x.moveTo(-7,-8);x.lineTo(7,-8);x.lineTo(5,9);x.lineTo(-5,9);x.closePath();x.fill();x.fillStyle='#1d3e79';x.fillRect(-7,-3,14,6);x.fillStyle='#0c1a36';x.fillRect(-8,-11,16,4);x.restore();}
function obst(o){const px=o.x,py=gy;x.save();x.fillStyle='rgba(0,0,0,.2)';x.beginPath();x.ellipse(px+o.w/2,py+2,o.w*.55,4,0,0,6.28);x.fill();
  if(o.t==='cone'){x.fillStyle='#e8722a';x.beginPath();x.moveTo(px+o.w/2,py-o.h);x.lineTo(px+o.w,py);x.lineTo(px,py);x.closePath();x.fill();x.fillStyle='#fff';x.fillRect(px+3,py-o.h*.55,o.w-6,o.h*.16);}
  else if(o.t==='box'){x.fillStyle='#8a5a34';x.fillRect(px,py-o.h,o.w,o.h);x.strokeStyle='#5e3c22';x.lineWidth=2;x.strokeRect(px,py-o.h,o.w,o.h);}
  else if(o.t==='kick'){x.strokeStyle='#3295d2';x.lineWidth=4;x.lineCap='round';x.beginPath();x.arc(px+6,py-6,6,0,6.28);x.moveTo(px+6,py-6);x.lineTo(px+o.w-8,py-6);x.arc(px+o.w-8,py-6,6,0,6.28);x.moveTo(px+o.w-8,py-6);x.lineTo(px+o.w-8,py-o.h);x.lineTo(px+o.w-2,py-o.h);x.stroke();}
  else{x.fillStyle='#2f7d55';x.beginPath();x.arc(px+o.w/2,py-o.h+8,12,0,6.28);x.fill();x.fillStyle='#b5613e';x.beginPath();x.moveTo(px+3,py-12);x.lineTo(px+o.w-3,py-12);x.lineTo(px+o.w-6,py);x.lineTo(px+6,py);x.closePath();x.fill();}
  x.restore();}
function player(){const p=G.p,px=p.x0||W*0.2,air=Math.max(0,(gy-p.y)/140);
  x.fillStyle='rgba(0,0,0,'+(0.24-air*.15)+')';x.beginPath();x.ellipse(px,gy+4,p.r*(.9-air*.3),5*(1-air*.3),0,0,6.28);x.fill();
  x.save();x.translate(px,p.y-p.r);x.rotate(p.rot);x.scale(1/p.sq,p.sq);
  x.strokeStyle='#0c1a36';x.lineWidth=4;x.lineCap='round';
  if(p.on){const sw=Math.sin(p.run)*7;x.beginPath();x.moveTo(-6,p.r-2);x.lineTo(-6+sw,p.r+11);x.moveTo(6,p.r-2);x.lineTo(6-sw,p.r+11);x.stroke();}
  else{x.beginPath();x.moveTo(-6,p.r-2);x.lineTo(-9,p.r+8);x.moveTo(6,p.r-2);x.lineTo(9,p.r+8);x.stroke();}
  const s=p.r*2.1;if(ready)x.drawImage(img,-s/2,-s/2,s,s);else{x.fillStyle='#3295d2';x.beginPath();x.arc(0,0,p.r,0,6.28);x.fill();}
  x.restore();}
document.getElementById('startBtn').onclick=start;
document.getElementById('retryBtn').onclick=start;
rs();requestAnimationFrame(loop);
</script>
